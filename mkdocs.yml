site_name: Petstore OpenAPI Client
site_url: https://ramonalcantaraarceo.github.io/petstore-openapi-client-pydantic/
repo_url: https://github.com/RamonAlcantaraArceo/petstore-openapi-client-pydantic
repo_name: RamonAlcantaraArceo/petstore-openapi-client-pydantic

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - codehilite
  - pymdownx.superfences

nav:
  - Home: README.md
  - API Endpoints:
      - Health API: docs/HealthApi.md
      - Pet API: docs/PetApi.md
      - Store API: docs/StoreApi.md
      - User API: docs/UserApi.md
  - Models:
      - Category: docs/Category.md
      - HealthDetails: docs/HealthDetails.md
      - HealthResponse: docs/HealthResponse.md
      - HTTPValidationError: docs/HTTPValidationError.md
      - LocationInner: docs/LocationInner.md
      - Order: docs/Order.md
      - OrderCreate: docs/OrderCreate.md
      - OrderStatus: docs/OrderStatus.md
      - Pet: docs/Pet.md
      - PetCreate: docs/PetCreate.md
      - PetStatus: docs/PetStatus.md
      - PetUpdate: docs/PetUpdate.md
      - Tag: docs/Tag.md
      - User: docs/User.md
      - UserCreate: docs/UserCreate.md
      - UserUpdate: docs/UserUpdate.md
      - ValidationError: docs/ValidationError.md
